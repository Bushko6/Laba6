name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: 🔍 Lint (flake8 + pylint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r lab5/lab5/requirements.txt
          pip install flake8 pylint

      - name: Run flake8
        run: |
          flake8 lab5/lab5/ --max-line-length=120 --exclude=__pycache__

      - name: Run pylint
        run: |
          pylint lab5/lab5/src/ --fail-under=7.0 || true

  test:
    name: 🧪 Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r lab5/lab5/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          cd lab5/lab5
          pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lab5/lab5/coverage.xml

  docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        run: |
          docker build \
            --file lab5/lab5/Dockerfile \
            --target runtime \
            --tag library-app:${{ github.sha }} \
            lab5/lab5/

      - name: Build test image
        run: |
          docker build \
            --file lab5/lab5/Dockerfile.test \
            --tag library-tests:${{ github.sha }} \
            lab5/lab5/

      - name: Run tests inside Docker
        run: |
          docker run --rm library-tests:${{ github.sha }}
